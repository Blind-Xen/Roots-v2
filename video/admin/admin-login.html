<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Roots • Admin Login</title>
  <link rel="stylesheet" href="../videos-styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../shared/nav.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px;
      background: white;
      border-radius: var(--r-lg);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      border: 1px solid var(--border);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header i {
      font-size: 64px;
      color: var(--forest);
      margin-bottom: 16px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--forest);
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--dust);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 14px;
      font-weight: 600;
      color: var(--slate);
    }

    .form-group input {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .login-btn {
      padding: 14px;
      background: var(--forest);
      color: white;
      border: none;
      border-radius: var(--r);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover {
      background: var(--primary);
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 12px;
      border-radius: var(--r-sm);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error-message.show {
      display: block;
    }
  </style>
</head>
<body>

<main class="content">
  <div class="login-container">
    <div class="login-header">
      <i class="fas fa-shield-alt"></i>
      <h1>Admin Login</h1>
      <p>Enter your password to access the admin panel</p>
    </div>

    <div class="error-message" id="errorMessage">
      <i class="fas fa-exclamation-circle"></i> Incorrect password. Please try again.
    </div>

    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="adminPassword">Admin Password</label>
        <input type="password" id="adminPassword" placeholder="Enter admin password" required>
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    <div class="back-link">
      <a href="../videos.html"><i class="fas fa-arrow-left"></i> Back to Videos</a>
    </div>
  </div>
</main>

<script src="../../shared/nav.js"></script>
<script src="../../shared/routes.js"></script>
<script src="../../shared/base.js"></script>
<script src="../../shared/userdd.js"></script>
<script src="../../shared/messaging.js"></script>
<script src="../../shared/notify.js"></script>
<script>
  initNotifications({ fakeData: true });
  Base.resolveAll();

  // Admin password - in production, this should be stored securely on the server
  const ADMIN_PASSWORD = 'admin123';

  function handleLogin(event) {
    event.preventDefault();
    
    const password = document.getElementById('adminPassword').value;
    const errorMessage = document.getElementById('errorMessage');
    
    if (password === ADMIN_PASSWORD) {
      // Store login session
      localStorage.setItem('rootsAdminLoggedIn', 'true');
      localStorage.setItem('rootsAdminLoginTime', Date.now().toString());
      
      showToast('✅ Login successful');
      
      // Redirect to admin panel
      setTimeout(() => {
        window.location.href = 'admin.html';
      }, 500);
    } else {
      errorMessage.classList.add('show');
      document.getElementById('adminPassword').value = '';
      document.getElementById('adminPassword').focus();
      
      // Hide error after 3 seconds
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 3000);
    }
  }

  // Check if already logged in
  document.addEventListener('DOMContentLoaded', () => {
    const isLoggedIn = localStorage.getItem('rootsAdminLoggedIn') === 'true';
    const loginTime = parseInt(localStorage.getItem('rootsAdminLoginTime') || '0');
    const sessionTimeout = 24 * 60 * 60 * 1000; // 24 hours
    
    if (isLoggedIn && (Date.now() - loginTime < sessionTimeout)) {
      // Already logged in, redirect to admin panel
      window.location.href = 'admin.html';
    }
  });
</script>
</body>
</html>
