<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📹 Roots • Video Editor</title>
  <link rel="stylesheet" href="videos-styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../shared/nav.css">
  <style>
    .editor-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }

    .editor-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--forest);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .editor-main {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 24px;
    }

    @media (max-width: 1024px) {
      .editor-main {
        grid-template-columns: 1fr;
      }
    }

    .video-preview-section {
      background: white;
      border-radius: var(--r-lg);
      padding: 20px;
      border: 1px solid var(--border);
    }

    .video-preview-container {
      position: relative;
      background: #000;
      border-radius: var(--r);
      overflow: hidden;
      aspect-ratio: 16/9;
      margin-bottom: 16px;
    }

    .video-preview-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .video-preview-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .video-preview-container:hover .video-preview-overlay {
      opacity: 1;
    }

    .timeline-container {
      background: var(--fog);
      border-radius: var(--r);
      padding: 16px;
      margin-top: 16px;
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .timeline-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--slate);
    }

    .timeline-track {
      position: relative;
      height: 60px;
      background: white;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .timeline-trim-handle {
      position: absolute;
      top: 0;
      width: 12px;
      height: 100%;
      background: var(--primary);
      cursor: ew-resize;
      z-index: 10;
    }

    .timeline-trim-handle.left {
      left: 0;
    }

    .timeline-trim-handle.right {
      right: 0;
    }

    .timeline-trim-area {
      position: absolute;
      top: 0;
      left: 12px;
      right: 12px;
      height: 100%;
      background: rgba(46, 125, 50, 0.2);
    }

    .editor-controls-section {
      background: white;
      border-radius: var(--r-lg);
      padding: 20px;
      border: 1px solid var(--border);
      height: fit-content;
    }

    .control-group {
      margin-bottom: 24px;
    }

    .control-group h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--slate);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .control-row label {
      flex: 1;
      font-size: 13px;
      color: var(--dust);
    }

    .control-row input[type="range"] {
      flex: 2;
      width: 100%;
    }

    .control-row input[type="number"] {
      width: 60px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: var(--r-xs);
      font-size: 13px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .filter-option {
      padding: 12px;
      background: var(--fog);
      border: 2px solid var(--border);
      border-radius: var(--r-sm);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
      font-weight: 600;
      color: var(--slate);
    }

    .filter-option:hover {
      border-color: var(--primary);
      background: #e8f5e9;
    }

    .filter-option.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .action-buttons button {
      flex: 1;
    }

    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--r-lg);
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .upload-area:hover {
      border-color: var(--primary);
      background: var(--pale);
    }

    .upload-area i {
      font-size: 48px;
      color: var(--primary);
      margin-bottom: 16px;
    }

    .upload-area p {
      font-size: 14px;
      color: var(--dust);
      margin-bottom: 8px;
    }

    .upload-area input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

<main class="content">
  <div class="editor-container">
    <div class="editor-header">
      <h1><i class="fas fa-film"></i> Video Editor</h1>
      <button class="btn secondary" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> Back to Videos
      </button>
    </div>

    <!-- Upload Section (shown when no video is loaded) -->
    <div id="uploadSection" class="upload-area" onclick="document.getElementById('videoFile').click()">
      <i class="fas fa-cloud-upload-alt"></i>
      <p style="font-size: 18px; font-weight: 600; color: var(--slate);">Upload a video to edit</p>
      <p>Supported: MP4, WebM, MOV (Max 500MB)</p>
      <input type="file" id="videoFile" accept="video/*" onchange="handleFileSelect(event)">
    </div>

    <!-- Editor Section (shown when video is loaded) -->
    <div id="editorSection" class="editor-main" style="display: none;">
      <div class="video-preview-section">
        <div class="video-preview-container">
          <video id="videoPreview" controls></video>
          <div class="video-preview-overlay">
            <button class="btn primary" onclick="togglePlay()">
              <i class="fas fa-play"></i>
            </button>
          </div>
        </div>

        <div class="timeline-container">
          <div class="timeline-header">
            <h3><i class="fas fa-cut"></i> Trim Video</h3>
            <span id="trimTime" style="font-size: 12px; color: var(--dust);">0:00 - 0:00</span>
          </div>
          <div class="timeline-track" id="timelineTrack">
            <div class="timeline-trim-handle left" id="trimLeft"></div>
            <div class="timeline-trim-area" id="trimArea"></div>
            <div class="timeline-trim-handle right" id="trimRight"></div>
          </div>
        </div>
      </div>

      <div class="editor-controls-section">
        <div class="control-group">
          <h3><i class="fas fa-sliders-h"></i> Adjustments</h3>
          <div class="control-row">
            <label>Brightness</label>
            <input type="range" id="brightness" min="0" max="200" value="100" oninput="applyFilters()">
          </div>
          <div class="control-row">
            <label>Contrast</label>
            <input type="range" id="contrast" min="0" max="200" value="100" oninput="applyFilters()">
          </div>
          <div class="control-row">
            <label>Saturation</label>
            <input type="range" id="saturation" min="0" max="200" value="100" oninput="applyFilters()">
          </div>
        </div>

        <div class="control-group">
          <h3><i class="fas fa-magic"></i> Filters</h3>
          <div class="filter-grid">
            <div class="filter-option active" data-filter="none" onclick="applyPresetFilter(this)">None</div>
            <div class="filter-option" data-filter="grayscale" onclick="applyPresetFilter(this)">Grayscale</div>
            <div class="filter-option" data-filter="sepia" onclick="applyPresetFilter(this)">Sepia</div>
            <div class="filter-option" data-filter="warm" onclick="applyPresetFilter(this)">Warm</div>
            <div class="filter-option" data-filter="cool" onclick="applyPresetFilter(this)">Cool</div>
            <div class="filter-option" data-filter="vintage" onclick="applyPresetFilter(this)">Vintage</div>
          </div>
        </div>

        <div class="control-group">
          <h3><i class="fas fa-tachometer-alt"></i> Speed</h3>
          <div class="control-row">
            <label>Playback Speed</label>
            <select id="playbackSpeed" style="flex: 2; padding: 6px; border: 1px solid var(--border); border-radius: var(--r-xs); font-size: 13px;" onchange="applySpeed()">
              <option value="0.5">0.5x</option>
              <option value="0.75">0.75x</option>
              <option value="1" selected>1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2x</option>
            </select>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn secondary" onclick="resetEdits()">
            <i class="fas fa-undo"></i> Reset
          </button>
          <button class="btn primary" onclick="exportVideo()">
            <i class="fas fa-upload"></i> Export & Upload
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="../../shared/nav.js"></script>
<script src="../../shared/routes.js"></script>
<script src="../../shared/base.js"></script>
<script src="../../shared/userdd.js"></script>
<script src="../../shared/messaging.js"></script>
<script src="../../shared/notify.js"></script>
<script src="videos-script.js"></script>
<script>
  initNotifications({ fakeData: true });
  Base.resolveAll();

  let currentVideoFile = null;
  let currentVideoBlob = null;
  let trimStartTime = 0;
  let trimEndTime = 0;
  let currentFilter = 'none';

  function goBack() {
    window.location.href = 'videos.html';
  }

  function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (file.size > 500 * 1024 * 1024) {
      showToast('⚠️ File size exceeds 500MB limit');
      return;
    }

    currentVideoFile = file;
    const url = URL.createObjectURL(file);
    const video = document.getElementById('videoPreview');
    video.src = url;

    video.onloadedmetadata = () => {
      trimStartTime = 0;
      trimEndTime = video.duration;
      updateTrimDisplay();
      document.getElementById('uploadSection').style.display = 'none';
      document.getElementById('editorSection').style.display = 'grid';
    };
  }

  function togglePlay() {
    const video = document.getElementById('videoPreview');
    if (video.paused) {
      video.play();
    } else {
      video.pause();
    }
  }

  function applyFilters() {
    const video = document.getElementById('videoPreview');
    const brightness = document.getElementById('brightness').value;
    const contrast = document.getElementById('contrast').value;
    const saturation = document.getElementById('saturation').value;

    video.style.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
  }

  function applyPresetFilter(element) {
    const video = document.getElementById('videoPreview');
    const filter = element.dataset.filter;
    currentFilter = filter;

    // Remove active class from all filters
    document.querySelectorAll('.filter-option').forEach(el => el.classList.remove('active'));
    element.classList.add('active');

    // Apply filter
    switch (filter) {
      case 'none':
        video.style.filter = 'none';
        break;
      case 'grayscale':
        video.style.filter = 'grayscale(100%)';
        break;
      case 'sepia':
        video.style.filter = 'sepia(100%)';
        break;
      case 'warm':
        video.style.filter = 'sepia(30%) saturate(140%) brightness(105%)';
        break;
      case 'cool':
        video.style.filter = 'hue-rotate(180deg) saturate(80%)';
        break;
      case 'vintage':
        video.style.filter = 'sepia(50%) contrast(90%) brightness(90%)';
        break;
    }
  }

  function applySpeed() {
    const video = document.getElementById('videoPreview');
    const speed = document.getElementById('playbackSpeed').value;
    video.playbackRate = parseFloat(speed);
  }

  function resetEdits() {
    const video = document.getElementById('videoPreview');
    video.style.filter = 'none';
    document.getElementById('brightness').value = 100;
    document.getElementById('contrast').value = 100;
    document.getElementById('saturation').value = 100;
    document.getElementById('playbackSpeed').value = '1';
    video.playbackRate = 1;

    document.querySelectorAll('.filter-option').forEach(el => el.classList.remove('active'));
    document.querySelector('.filter-option[data-filter="none"]').classList.add('active');
    currentFilter = 'none';
  }

  function updateTrimDisplay() {
    const video = document.getElementById('videoPreview');
    const startTime = formatTime(trimStartTime);
    const endTime = formatTime(trimEndTime);
    document.getElementById('trimTime').textContent = `${startTime} - ${endTime}`;
  }

  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  async function exportVideo() {
    showToast('⏳ Processing video...');

    try {
      // In a real implementation, this would use ffmpeg.wasm or WebCodecs API
      // For now, we'll just save the original video with metadata about edits
      const video = document.getElementById('videoPreview');
      
      // Save video blob to IndexedDB
      const blobId = `edited_${Date.now()}`;
      const blob = await fetch(video.src).then(r => r.blob());
      await idbPutVideoBlob(blobId, blob);

      // Create video metadata
      const videoData = {
        id: Date.now(),
        title: currentVideoFile.name.replace(/\.[^/.]+$/, ''),
        thumbnail: makeSvgThumbnail(currentVideoFile.name),
        duration: formatTime(video.duration),
        views: '0',
        uploader: 'You',
        date: 'just now',
        isLocal: true,
        isApproved: true,
        videoBlobId: blobId,
        edits: {
          brightness: document.getElementById('brightness').value,
          contrast: document.getElementById('contrast').value,
          saturation: document.getElementById('saturation').value,
          filter: currentFilter,
          speed: document.getElementById('playbackSpeed').value,
          trimStart: trimStartTime,
          trimEnd: trimEndTime
        }
      };

      // Add to local videos
      allVideos.push(videoData);
      localStorage.setItem('rootsLocalVideos', JSON.stringify(allVideos));

      showToast('✅ Video exported and ready to upload');
      setTimeout(() => {
        window.location.href = 'videos.html';
      }, 1000);
    } catch (error) {
      console.error('Export error:', error);
      showToast('❌ Failed to export video');
    }
  }

  // Initialize trim handles
  document.addEventListener('DOMContentLoaded', () => {
    const trimLeft = document.getElementById('trimLeft');
    const trimRight = document.getElementById('trimRight');
    const timelineTrack = document.getElementById('timelineTrack');

    let isDragging = null;

    trimLeft.addEventListener('mousedown', () => isDragging = 'left');
    trimRight.addEventListener('mousedown', () => isDragging = 'right');

    document.addEventListener('mouseup', () => isDragging = null);

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;

      const rect = timelineTrack.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const percentage = Math.max(0, Math.min(100, (x / rect.width) * 100));

      const video = document.getElementById('videoPreview');
      if (video.duration) {
        const time = (percentage / 100) * video.duration;

        if (isDragging === 'left') {
          trimStartTime = Math.min(time, trimEndTime - 1);
          trimLeft.style.left = `${(trimStartTime / video.duration) * 100}%`;
        } else {
          trimEndTime = Math.max(time, trimStartTime + 1);
          trimRight.style.right = `${100 - (trimEndTime / video.duration) * 100}%`;
        }

        updateTrimDisplay();
      }
    });
  });
</script>
</body>
</html>
