<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../messaging/messaging.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #f5f5f3;
    }

    /*
     * #msg-page fills whatever vertical space is left after your injected nav.
     * If your nav uses a CSS variable for its height, replace the calc() below.
     * Common patterns:
     *   height: calc(100vh - 56px)   ← fixed pixel nav height
     *   height: calc(100vh - var(--nav-height))
     *   height: 100vh                ← if your nav is sticky and outside this page's flow
     */
    #msg-page {
      height: calc(100vh - 56px); /* ← adjust 56px to match your nav height */
      padding: 24px;
      display: flex;
    }

    #msg-shell {
      flex: 1;
    }
  </style>
</head>
<body>

  <!--
    Your nav is injected here automatically.
    No nav markup needed in this file.
  -->

  <div id="msg-page">
    <div id="msg-shell"></div>
  </div>

  <script src="../../shared/messaging.js"></script>
  <script>
    /*
     * Replace 'alice' with however you resolve the logged-in user —
     * e.g. from a <meta> tag, a decoded token, or a session object:
     *
     *   document.querySelector('meta[name="username"]')?.content
     *   JSON.parse(localStorage.getItem('session'))?.username
     */
    const currentUser = 'alice';

    Messaging.init({
      user:    currentUser,
      adapter: new LocalStorageAdapter(), // swap for new RestApiAdapter('/api') in production
      poll:    true,

      // Pre-open a thread when linking from a profile page:
      //   <a href="/messages.html?with=bob">Message</a>
      openThread: new URLSearchParams(location.search).get('with') ?? undefined,
    });
  </script>

</body>
</html>
